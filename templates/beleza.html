{% extends "base.html" %}

{% block title %}Beleza Premium{% endblock %}

{% block content %}
<div style="max-width: 1400px; margin: 20px auto; padding: 0 20px;">
    <!-- Botão Voltar -->
    <a href="/midasvip-select" style="color: #d4af37; text-decoration: none; font-size: 18px; display: inline-block; margin-bottom: 20px;">
        ← Voltar para Categorias
    </a>
    
    <h2>💄 Beleza Premium</h2>
    
    <div class="grid">
        {% for item in produtos %}
        <div class="card">
            <h3>{{ item.nome }}</h3>
            <!-- A linha da descrição foi removida aqui -->
            <a href="{{ item.link }}" target="_blank" class="btn">VER DETALHES</a>
        </div>
        {% else %}
        <p>Estamos buscando novas ofertas para você. Volte em breve!</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
