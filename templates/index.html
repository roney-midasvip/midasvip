<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MIDASVIP</title>
    <style>
        body {
            background-color: #121212;
            color: #d4af37;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .noticia {
            margin: 20px;
            padding: 10px;
            border: 1px solid #d4af37;
        }
        a {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <h1>MIDASVIP</h1>

    {% for item in resultados %}
      <div class="noticia">
        <h3>{{ item.titulo }}</h3>
        <a href="{{ item.link }}">Ler mais</a>
      </div>
    {% endfor %}

</body>
</html>
