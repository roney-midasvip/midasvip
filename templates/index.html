<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MIDASVIP - Notícias</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .pesquisa { text-align: center; margin-bottom: 40px; }
        .pesquisa input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        .pesquisa button { padding: 10px 20px; background-color: #ffd700; border: none; cursor: pointer; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 15px; width: 300px; border-radius: 8px; }
        .card h3 { font-size: 1.2em; margin-bottom: 10px; color: #ffd700; }
        .card a { color: #fff; text-decoration: none; display: block; margin-top: 15px; background: #333; padding: 10px; text-align: center; border-radius: 4px; }
        .card a:hover { background: #444; }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <h1 style="text-align: center;">MIDASVIP</h1>

    <!-- Busca -->
    <div class="pesquisa">
        <form action="/buscar" method="GET">
            <input type="text" name="q" placeholder="Pesquisar celebridade, bilionário..." required>
            <button type="submit">Buscar</button>
        </form>
    </div>

    <!-- Notícias -->
    <div class="container">
        {% for n in noticias %}
        <div class="card">
            <h3>{{ n.titulo if n.titulo else 'Título indisponível' }}</h3>
            <p style="font-size: 0.8em; color: #aaa;">{{ n.data if n.data else '' }} | {{ n.categoria if n.categoria else 'Geral' }}</p>
            <a href="{{ n.link_produto }}" target="_blank">LER NOTÍCIA</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
