<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDASVIP - Exclusividade</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border: 1px solid #bf953f; border-radius: 10px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        h3 { color: #fff; height: 60px; overflow: hidden; }
        .btn { display: block; padding: 12px; margin-top: 10px; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; }
        .btn-ler { background: #333; color: #fff; }
        .btn-comprar { background: #bf953f; color: #000; }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: #bf953f;">MIDASVIP</h1>
    <div class="grid">
        {% for n in resultados %}
        <div class="card">
            <img src="{{ n.imagem }}" alt="Notícia">
            <h3>{{ n.titulo }}</h3>
            <p><small>{{ n.motivo }}</small></p>
            <a href="{{ n.link }}" class="btn btn-ler" target="_blank">LER NOTÍCIA</a>
            <a href="{{ n.link }}" class="btn btn-comprar" target="_blank">COMPRAR: {{ n.produto }}</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
