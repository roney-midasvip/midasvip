<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; }
        .busca-container { text-align: center; padding: 20px; }
        .busca-container input { padding: 12px; width: 400px; border-radius: 20px; border: none; }
        .busca-container button { padding: 12px 25px; border-radius: 20px; border: none; background: #ffd700; cursor: pointer; font-weight: bold; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { width: 300px; background: #1e1e1e; padding: 15px; border-radius: 10px; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 5px; }
        .btn-noticia { display: block; background: #444; color: white; text-align: center; padding: 10px; margin: 10px 0; text-decoration: none; border-radius: 5px; }
        .btn-produto { display: block; background: #ffd700; color: black; text-align: center; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="busca-container">
        <form action="/buscar" method="GET">
            <input type="text" name="q" placeholder="Pesquisar celebridade, bilionário..." required>
            <button type="submit">BUSCAR</button>
        </form>
    </div>
    <div class="grid">
        {% for n in noticias %}
        <div class="card">
            <img src="{{ n.imagem }}">
            <h3>{{ n.titulo }}</h3>
            <!-- Link da Notícia (se você tiver uma coluna 'link_noticia' no banco) -->
            <a href="{{ n.link_noticia }}" class="btn-noticia" target="_blank">LER NOTÍCIA</a>
            <!-- Link do Produto (o afiliado) -->
            <a href="{{ n.link_afiliado }}" class="btn-produto" target="_blank">COMPRAR PRODUTO</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
