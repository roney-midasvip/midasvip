<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MidasVIP - Notícias</title>
    <style>
        body { font-family: 'Georgia', serif; margin: 20px; background-color: #1a1a1a; color: #f4f4f4; }
        h1 { color: #d4af37; text-align: center; font-size: 2.5em; text-shadow: 2px 2px #000; }
        
        /* Layout em Grade (Quadrados) */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .noticia-card { background: #2a2a2a; padding: 15px; border-radius: 8px; border: 1px solid #d4af37; display: flex; flex-direction: column; }
        
        .imagem-noticia { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        
        h3 { color: #d4af37; font-size: 1.2em; margin: 10px 0; }
        .info { font-size: 0.8em; color: #aaa; margin-bottom: 10px; }
        
        .btn-container { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
        a { text-align: center; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 5px; color: #1a1a1a; background-color: #d4af37; }
        .btn-venda { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

    <h1>👑 MidasVIP - Últimas Notícias</h1>

    <div class="container">
        {% for noticia in noticias %}
        <div class="noticia-card">
            <img src="{{ noticia.imagem }}" alt="Imagem" class="imagem-noticia">
            <h3>{{ noticia.titulo }}</h3>
            <div class="info">Data: {{ noticia.data }} | {{ noticia.categoria }}</div>
            
            <div class="btn-container">
                <!-- Link da notícia corrigido -->
                <a href="{{ noticia.link_noticia if noticia.link_noticia.startswith('http') else 'https://' + noticia.link_noticia }}" target="_blank">Ler notícia</a>
                
                <!-- Link de Venda -->
                <a href="https://SEU_LINK_AQUI" class="btn-venda" target="_blank">Oferta Especial</a>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
