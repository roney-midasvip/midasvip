<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDASVIP</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Logo e Busca */
        .header-container { text-align: center; padding: 40px 20px; }
        .logo { max-width: 250px; margin-bottom: 20px; }
        
        .search-box { margin-bottom: 40px; }
        .search-box input { padding: 12px 20px; width: 350px; border-radius: 25px; border: none; background: #1e1e1e; color: #fff; border: 1px solid #333; outline: none; }
        .search-box button { padding: 12px 25px; border-radius: 25px; border: none; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.3s; }
        .search-box button:hover { background: #e6c200; }

        /* Grid de Notícias */
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 0 20px 40px 20px; }
        .card { width: 300px; background: #1e1e1e; border-radius: 10px; padding: 15px; border: 1px solid #333; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; }
        .card h3 { font-size: 1.1em; color: #fff; margin-bottom: 10px; min-height: 50px; }
        .card p { font-size: 0.8em; color: #888; margin-bottom: 15px; }
        
        /* Botões */
        .btn { display: block; text-align: center; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 5px; }
        .btn-noticia { background: #444; color: #fff; }
        .btn-produto { background: #ffd700; color: #000; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header-container">
        <!-- Logo -->
        <img src="/static/logo.png" alt="MidasVIP" class="logo">
        
        <!-- Busca -->
        <div class="search-box">
            <form action="/buscar" method="GET">
                <input type="text" name="q" placeholder="Pesquisar celebridade, bilionário..." required>
                <button type="submit">BUSCAR</button>
            </form>
        </div>
    </div>

    <!-- Lista de Notícias -->
    <div class="container">
        {% for n in noticias %}
        <div class="card">
            {% if n.imagem %}
                <img src="{{ n.imagem }}" alt="Notícia">
            {% endif %}
            <h3>{{ n.titulo }}</h3>
            <p>{{ n.data }} | {{ n.categoria }}</p>
            
            <a href="{{ n.link_noticia }}" class="btn btn-noticia" target="_blank">LER NOTÍCIA</a>
            <a href="{{ n.link_afiliado }}" class="btn btn-produto" target="_blank">COMPRAR PRODUTO</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
