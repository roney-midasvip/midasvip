<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MIDASVIP</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .pesquisa { text-align: center; margin-bottom: 30px; }
        .card-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { width: 300px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; }
        .card h3 { color: #ffd700; font-size: 1.1em; }
        .btn { display: block; background: #333; color: #fff; text-align: center; padding: 10px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">MIDASVIP</h1>
    <div class="pesquisa">
        <form action="/buscar" method="GET">
            <input type="text" name="q" placeholder="Pesquisar celebridade, bilionário..." required>
            <button type="submit">Buscar</button>
        </form>
    </div>

    <div class="card-container">
        {% for n in noticias %}
        <div class="card">
            <!-- Certifique-se que no seu DB a coluna da imagem se chama 'imagem' -->
            {% if n.imagem %}<img src="{{ n.imagem }}" alt="Notícia">{% endif %}
            <h3>{{ n.titulo }}</h3>
            <p style="font-size: 0.8em;">{{ n.data }} | {{ n.categoria }}</p>
            <a href="{{ n.link_final }}" target="_blank" class="btn">LER NOTÍCIA</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
