<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDASVIP</title>
    <style>
        body { 
            background-color: #121212; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .header-container { 
            text-align: center; 
            padding: 40px 20px; 
        }
        .logo { 
            max-width: 250px; 
            height: auto; 
            display: block; 
            margin: 0 auto 20px auto; 
        }
        .search-box { 
            margin-bottom: 40px; 
        }
        .search-box input { 
            padding: 12px 20px; 
            width: 350px; 
            border-radius: 25px; 
            border: none; 
            background: #1e1e1e; 
            color: #fff; 
            border: 1px solid #333; 
        }
        .search-box button { 
            padding: 12px 25px; 
            border-radius: 25px; 
            border: none; 
            background: #ffd700; 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
            margin-left: 10px; 
        }
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            justify-content: center; 
            padding: 0 20px 40px 20px; 
        }
        .card { 
            width: 300px; 
            background: #1e1e1e; 
            border-radius: 10px; 
            padding: 15px; 
            border: 1px solid #333; 
        }
        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 6px; 
            margin-bottom: 15px; 
        }
        .btn { 
            display: block; 
            text-align: center; 
            padding: 10px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            margin-top: 5px; 
            color: #000; 
        }
        .btn-noticia { background: #fff; margin-bottom: 10px; }
        .btn-produto { background: #ffd700; }
    </style>
</head>
<body>

    <div class="header-container">
        <!-- Carrega a logo da pasta static -->
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MidasVIP" class="logo">
        
        <div class="search-box">
            <form action="/buscar" method="GET">
                <input type="text" name="q" placeholder="Pesquisar..." required>
                <button type="submit">BUSCAR</button>
            </form>
        </div>
    </div>

    <div class="container">
        {% for n in noticias %}
        <div class="card">
            <img src="{{ n.imagem }}" alt="Notícia">
            <h3>{{ n.titulo }}</h3>
            <a href="{{ n.link_noticia }}" class="btn btn-noticia" target="_blank">LER NOTÍCIA</a>
            <a href="{{ n.link_afiliado }}" class="btn btn-produto" target="_blank">COMPRAR PRODUTO</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
